# DEBUG / single-GPU, short steps. Same path as the full run;
# real cf_qa + reasoning (small, local). --minimal-run shrinks further.
model:
  base: meta-llama/Llama-3.1-8B-Instruct
  tokenizer_mirror: unsloth/Meta-Llama-3.1-8B-Instruct
wandb_project: pcd-counterfactuals
qa:
  path: data/counterfactual_qa/qa_pool/cf_qa.parquet
  manifest_path: artifacts/activations/qa_pool/collect_manifest.parquet
  application_path: data/applications/subject_set.parquet
  include_application: true
  train_split: pcd_train
  val_split: sense1_test
  val_examples: 64
  answer_prompt: '

    Answer:'
  max_len: 768
  num_workers: 0
run:
  name: baseline-f2-debug
train:
  output_root: artifacts/baselines
  subject_adapter: artifacts/subject/subject-lora-v1/adapter
  lora:
    r: 16
    alpha: 32
    dropout: 0.05
    target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  learning_rate: 0.0001
  betas:
  - 0.9
  - 0.999
  weight_decay: 0.01
  lr_scheduler_type: cosine
  per_device_batch_size: 4
  gradient_accumulation_steps: 2
  max_grad_norm: 1.0
  total_steps: 30
  checkpoint_step_milestones: []
  val_every_steps: 10
  log_every_steps: 5
  report_to: none
  seed: 0
minimal_run: false
