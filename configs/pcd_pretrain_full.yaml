# PCD encoder + decoder pretraining (FULL / 8xH100).
#
# Architecture is fixed to the paper (Huang et al.): Llama-3.1-8B-Instruct
# subject/decoder, d=4096, m=32768 (8x), k=16, l_read=15, l_write=0, aux loss.
# Runs unchanged on 1 GPU and 8xH100 via `accelerate` (no world-size branches):
#     accelerate launch --num_processes 8 scripts/pretrain_pcd.py \
#         --config configs/pcd_pretrain_full.yaml

model:
  base: meta-llama/Llama-3.1-8B-Instruct
  tokenizer_mirror: unsloth/Meta-Llama-3.1-8B-Instruct   # ungated fallback (HF_TOKEN unset)

read_layer: 15 # SETTLED (l_read; = /C read)
wandb_project: pcd-counterfactuals

encoder:
  n_concepts: 32768                                      # m = 8x d (paper)
  k: 16                                                  # active concepts / token
  aux_k: 500                                             # dead concepts revived / token
  aux_coef: 1.0e-4                                       # eps_aux (paper A.1)
  dead_window_tokens: 1000000                            # "inactive within last 1M tokens"

data:
  seq: {n_prefix: 16, n_middle: 16, n_suffix: 16} # paper 
  window: random                                         # window offset within a passage
  instruct_prefix: true                                  # prepend Llama instruct prefix (paper A.1)
  num_workers: 8
  anchor_text: "AMOUNT APPROVED: $"
  anchor_token_id: 400 # SETTLED ()
  # static mixture: FineWeb-anchored, domain upweight, small app slice
  mixture:
    general: 0.72
    domain: 0.18
    application: 0.10
  # RECOMMENDED: build the cache once (offline, ~20-30 min on the cheap pod) so
  # training is GPU-bound (measured 736 vs 173 tok/s when streaming live):
  #   scripts/build_pretrain_cache.py --config <this> --n-domain-docs 12000 --n-general-docs 60000
  general:
    source: cache                                       # cache | fineweb | local | synthetic
    cache_file: data/pretrain_cache/general.parquet
    hf_name: HuggingFaceFW/fineweb                       # (used by build_pretrain_cache / streaming fallback)
    hf_subset: sample-10BT
    hf_split: train
    min_chars: 400
  domain:
    source: cache                                        # finance-filtered FineWeb (pre-built)
    cache_file: data/pretrain_cache/domain.parquet
  domain_reject_limit: 300                               # only used if domain.source == fineweb
  application:
    path: data/applications/subject_set.parquet
    split: subject_train
    name_split_path: data/names/name_splits.parquet
    name_split: pcd_train                                # leakage guard: PCD-train names only
    exclude_races: [asian] # withheld race (docs/stage_d.md sense2_race)
    append_amount: true                                  # realistic decision-line format...
    mask_decision_line: true                             # ...but masked out of the loss (no formula leak)

run:
  name: pcd-pretrain-v2                                  # v2: LR-schedule fix (single cosine cycle) + 240K-doc general cache; v1 kept for comparison

train:
  output_root: artifacts/pcd                         # gitignored; rsync to local disk
  subject_adapter: artifacts/subject/subject-lora-v1/adapter # frozen subject (winner)
  lora:
    r: 16                                                # paper ablation found rank ~ambiguous
    alpha: 32                                            # paper A.1
    dropout: 0.05                                        # paper A.1
    target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]
  learning_rate: 1.0e-4                                  # paper A.1
  betas: [0.9, 0.999]
  weight_decay: 0.01                                     # paper A.1 (excl. biases / 1-D params)
  lr_scheduler_type: cosine                              # paper A.1 (no warmup)
  per_device_batch_size: 8
  gradient_accumulation_steps: 4                         # eff batch = 8 * 4 * 4 = 128 (paper A.1); 4xH100 (was 2 for 8 GPUs)
  max_grad_norm: 1.0
  max_tokens: 36000000                                  # single run at 36M tokens (settled)
  token_accounting: encoder                              # count middle (encoder) tokens; all counters logged
  checkpoint_token_milestones: [9000000, 18000000]      # loss/checkpoint snapshots within the one run (final = 36M)
  log_every_steps: 20
  report_to: wandb                                       # offline fallback w/o WANDB_API_KEY
  seed: 0

minimal_run: false
