# PCD decoder finetuning on counterfactual QA (FULL / 4xH100).
#
# Paper recipe: freeze the encoder, continue training the decoder
# LoRA, mix next-token pretraining data at 50% frequency (alternating
# micro-batches), same optimizer hyperparameters as pretraining, fixed step
# budget (paper: 4000 steps @ eff batch 128 -> here 64 QA + 64 LM per step,
# ~0.91 epochs over the 280,759 pcd_train QA instances).
#     accelerate launch --num_processes 4 scripts/finetune_pcd.py \
#         --config configs/pcd_finetune_full.yaml

model:
  base: meta-llama/Llama-3.1-8B-Instruct
  tokenizer_mirror: unsloth/Meta-Llama-3.1-8B-Instruct   # ungated fallback (HF_TOKEN unset)

read_layer: 15                                           # for the LM-mix subject read
wandb_project: pcd-counterfactuals

encoder: # FROZEN (paper)
  ckpt: artifacts/pcd/pcd-pretrain-v2/final/encoder.pt
  d_model: 4096
  n_concepts: 32768
  k: 16 # train-time k; varies at eval only

qa:
  path: data/counterfactual_qa/qa_pool/cf_qa.parquet
  z_path: artifacts/activations/qa_pool/z_original.npy       # (20000, 4096) layer-15 anchor read
  train_split: pcd_train                                 # leakage guard: sense1/sense2 never trained
  val_split: sense1_test                                 # in-dist monitoring only (G does real eval)
  val_examples: 2048
  answer_prompt: "\nAnswer:"                             # question + this, then " <delta_str>" + eos
  num_workers: 2

# 50% next-token mix (paper "continue mixing... at 50% frequency"): the 
# pretraining mixture itself (FineWeb general + finance domain + applications),
# read from the same cache -> the data the decoder must not forget.
lm_data:
  seq: {n_prefix: 16, n_middle: 16, n_suffix: 16}
  window: random
  instruct_prefix: true
  num_workers: 4
  anchor_text: "AMOUNT APPROVED: $"
  anchor_token_id: 400
  mixture:
    general: 0.72
    domain: 0.18
    application: 0.10
  general:
    source: cache
    cache_file: data/pretrain_cache/general.parquet
    min_chars: 400
  domain:
    source: cache
    cache_file: data/pretrain_cache/domain.parquet
  application:
    path: data/applications/subject_set.parquet
    split: subject_train
    name_split_path: data/names/name_splits.parquet
    name_split: pcd_train                                # leakage guard: PCD-train names only
    exclude_races: [asian] # withheld race (sense2_race)
    append_amount: true
    mask_decision_line: true                             # formula enters only via the QA loss

readout: # the auditable object
  labels_path: artifacts/pcd/autointerp-v2/concept_labels.json
  manifest_path: artifacts/activations/qa_pool/collect_manifest.parquet

run:
  name: pcd-finetune-v1

train:
  output_root: artifacts/pcd
  subject_adapter: artifacts/subject/subject-lora-v1/adapter   # frozen subject (LM-mix read)
  decoder_lora_init: artifacts/pcd/pcd-pretrain-v2/final/decoder_lora # continue LoRA
  learning_rate: 1.0e-4                                  # paper A.1 (same as pretraining)
  betas: [0.9, 0.999]
  weight_decay: 0.01
  lr_scheduler_type: cosine                              # no warmup (paper A.1)
  per_device_batch_size: 8
  gradient_accumulation_steps: 4                         # eff batch = 8*4*4 = 128 (paper A.1)
  max_grad_norm: 1.0
  total_steps: 4000 # paper / Fig. 17-18 finetuning horizon
  checkpoint_step_milestones: [1000, 2000, 3000]
  val_every_steps: 250
  log_every_steps: 20
  report_to: wandb
  seed: 0

minimal_run: false
