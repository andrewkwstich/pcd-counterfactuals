# PCD decoder finetuning (DEBUG / single-GPU, short steps).
#
# Same code path as the full run. QA data is the real cf_qa.parquet +
# z_original.npy (small, local); the LM mix uses the synthetic source so no
# network or cache is needed.
#     python scripts/finetune_pcd.py --config configs/pcd_finetune_debug.yaml --minimal-run

model:
  base: meta-llama/Llama-3.1-8B-Instruct
  tokenizer_mirror: unsloth/Meta-Llama-3.1-8B-Instruct

read_layer: 15
wandb_project: pcd-counterfactuals

encoder:
  ckpt: artifacts/pcd/pcd-pretrain-v2/final/encoder.pt
  d_model: 4096
  n_concepts: 32768
  k: 16

qa:
  path: data/counterfactual_qa/qa_pool/cf_qa.parquet
  z_path: artifacts/activations/qa_pool/z_original.npy
  train_split: pcd_train
  val_split: sense1_test
  val_examples: 64
  answer_prompt: "\nAnswer:"
  num_workers: 0

lm_data:
  seq: {n_prefix: 16, n_middle: 16, n_suffix: 16}
  window: random
  instruct_prefix: true
  num_workers: 0
  anchor_text: "AMOUNT APPROVED: $"
  anchor_token_id: 400
  mixture:
    general: 0.7
    domain: 0.15
    application: 0.15
  general:
    source: synthetic                                    # offline; no network needed
    min_chars: 200
  domain: {}
  domain_reject_limit: 50
  application:
    path: data/applications/subject_set.parquet
    split: subject_train
    name_split_path: data/names/name_splits.parquet
    name_split: pcd_train
    exclude_races: []
    append_amount: true
    mask_decision_line: true

readout:
  labels_path: artifacts/pcd/autointerp-v2/concept_labels.json
  manifest_path: artifacts/activations/qa_pool/collect_manifest.parquet
  max_rows: 256

run:
  name: pcd-finetune-debug

train:
  output_root: artifacts/pcd
  subject_adapter: artifacts/subject/subject-lora-v1/adapter
  decoder_lora_init: artifacts/pcd/pcd-pretrain-v2/final/decoder_lora
  learning_rate: 1.0e-4
  betas: [0.9, 0.999]
  weight_decay: 0.01
  lr_scheduler_type: cosine
  per_device_batch_size: 4
  gradient_accumulation_steps: 2
  max_grad_norm: 1.0
  total_steps: 30
  checkpoint_step_milestones: []
  val_every_steps: 10
  log_every_steps: 5
  report_to: none
  seed: 0

minimal_run: false
