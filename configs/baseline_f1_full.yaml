# text-only auditor (FULL / 4xH100). Primary baseline.
#
# Same decoder base as PCD (base + subject LoRA, merged) + fresh LoRA,
# same CF-QA targets/splits, same optimizer budget as (4000 steps @ eff
# batch 128, cosine→0). Input = subject reasoning + question → signed delta.
# No activation, no application, no LM mix.
#     accelerate launch --num_processes 4 scripts/finetune_baseline.py \
#         --config configs/baseline_f1_full.yaml

model:
  base: meta-llama/Llama-3.1-8B-Instruct
  tokenizer_mirror: unsloth/Meta-Llama-3.1-8B-Instruct   # ungated fallback (HF_TOKEN unset)

wandb_project: pcd-counterfactuals

qa:
  path: data/counterfactual_qa/qa_pool/cf_qa.parquet
  manifest_path: artifacts/activations/qa_pool/collect_manifest.parquet   # reasoning source
  application_path: data/applications/subject_set.parquet # unused for 
  include_application: false #: reasoning only
  train_split: pcd_train
  val_split: sense1_test
  val_examples: 2048
  answer_prompt: "\nAnswer:"
  max_len: 768
  num_workers: 4

run:
  name: baseline-f1-v1

train:
  output_root: artifacts/baselines
  subject_adapter: artifacts/subject/subject-lora-v1/adapter          # merged into base (capacity parity)
  lora:
    r: 16
    alpha: 32
    dropout: 0.05
    target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]
  learning_rate: 1.0e-4 # same as / paper A.1
  betas: [0.9, 0.999]
  weight_decay: 0.01
  lr_scheduler_type: cosine
  per_device_batch_size: 4
  gradient_accumulation_steps: 8 # eff batch = 4*8*4 = 128 (=); bs 4 to fit CE-over-vocab spike
  max_grad_norm: 1.0
  total_steps: 4000 # same budget as 
  checkpoint_step_milestones: [1000, 2000, 3000]
  val_every_steps: 250
  log_every_steps: 20
  report_to: wandb
  seed: 0

minimal_run: false
