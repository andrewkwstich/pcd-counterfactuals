# PCD pretraining (DEBUG / single-H100, tiny data, short steps).
#
# Same code path as the full run, sized to validate on 1 GPU. Uses the
# `synthetic` text source by default so it needs no network or corpus; set
# data.general.source: fineweb (+ min_chars) to exercise real streaming.
#     python scripts/pretrain_pcd.py --config configs/pcd_pretrain_debug.yaml
#     python scripts/pretrain_pcd.py --config configs/pcd_pretrain_debug.yaml --minimal-run

model:
  base: meta-llama/Llama-3.1-8B-Instruct
  tokenizer_mirror: unsloth/Meta-Llama-3.1-8B-Instruct

read_layer: 15
wandb_project: pcd-counterfactuals

encoder:
  n_concepts: 32768
  k: 16
  aux_k: 500
  aux_coef: 1.0e-4
  dead_window_tokens: 100000                             # smaller window so aux fires within a short run

data:
  seq: {n_prefix: 16, n_middle: 16, n_suffix: 16}
  window: random
  instruct_prefix: true
  num_workers: 2
  anchor_text: "AMOUNT APPROVED: $"
  anchor_token_id: 400
  mixture:
    general: 0.7
    domain: 0.15
    application: 0.15
  general:
    source: synthetic                                    # offline; no network needed
    min_chars: 200
  domain: {}
  domain_reject_limit: 50
  application:
    path: data/applications/subject_set.parquet
    split: subject_train
    name_split_path: data/names/name_splits.parquet
    name_split: pcd_train
    exclude_races: []
    append_amount: true
    mask_decision_line: true

run:
  name: pcd-pretrain-debug

train:
  output_root: artifacts/pcd
  subject_adapter: artifacts/subject/subject-lora-v1/adapter
  lora:
    r: 16
    alpha: 32
    dropout: 0.05
    target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]
  learning_rate: 1.0e-4
  betas: [0.9, 0.999]
  weight_decay: 0.01
  lr_scheduler_type: cosine
  per_device_batch_size: 8
  gradient_accumulation_steps: 2
  max_grad_norm: 1.0
  max_tokens: 500000                                     # tiny; a few hundred steps on 1 GPU
  token_accounting: encoder
  checkpoint_token_milestones: []
  log_every_steps: 5
  report_to: none
  seed: 0

minimal_run: false
