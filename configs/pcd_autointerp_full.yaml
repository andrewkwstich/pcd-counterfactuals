# auto-interp labeling of frozen PCD concepts (FULL).
#
#     python scripts/autointerp_pcd.py --config configs/pcd_autointerp_full.yaml
#
# Requires an encoder checkpoint and (for real labels) an OpenAI-compatible
# API key. The labels are read by humans / metrics; never fed to the decoder.

model:
  base: meta-llama/Llama-3.1-8B-Instruct
  tokenizer_mirror: unsloth/Meta-Llama-3.1-8B-Instruct

read_layer: 15

encoder:
  n_concepts: 32768
  k: 16

run:
  name: autointerp-v2                                    # labels the pcd-pretrain-v2 encoder

autointerp:
  output_root: artifacts/pcd
  subject_adapter: artifacts/subject/subject-lora-v1/adapter
  encoder_ckpt: artifacts/pcd/pcd-pretrain-v2/final/encoder.pt # from (v2: LR fix, frac_alive 0.91)
  corpus:
    source: applications # loan-domain concepts
    path: data/applications/subject_set.parquet
    split: qa_pool                                       # held-out-from-subject pool
  seq_len: 64
  max_passages: 4000
  batch_passages: 32
  top_n: 20                                              # exemplars kept per concept
  ctx_radius: 8                                          # tokens of context around the firing token
  n_concepts_to_label: 400                               # paper samples 400 concepts for the score
  n_describe: 10                                         # exemplars used to write the description
  min_exemplars: 5                                       # exclude trivial concepts (n<5 gives +/-1 degenerate r)
  seed: 0
  llm:
    backend: openai                                     # openai | mock
    model: gpt-5.4
    # base_url: https://...                              # for an OpenAI-compatible endpoint
    temperature: 0.0

minimal_run: false
